<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去水印批量工具</title>
<style>
:root {
  --bg: #0f0f1e;
  --card: #1a1a2e;
  --input: #16213e;
  --accent: #0f3460;
  --accent2: #e94560;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: #2a2a4a;
  --success: #4ecca3;
  --error: #e94560;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1100px; margin: 0 auto; }
h1 { text-align: center; font-size: 1.8em; margin-bottom: 20px; color: var(--text); }
.subtitle { text-align: center; color: var(--text-dim); margin-bottom: 30px; font-size: 0.9em; }

/* Config */
.config-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.config-bar label { font-size: 0.9em; color: var(--text-dim); }
.config-bar input[type="number"] {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 1em;
  width: 100px;
}
.config-bar select {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 0.9em;
}
.hint { color: var(--text-dim); font-size: 0.8em; }

/* History */
.history-panel {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  max-height: 500px;
  overflow-y: auto;
}
.history-panel h3 { font-size: 1em; margin-bottom: 12px; color: var(--text); }
.history-empty { text-align: center; color: var(--text-dim); padding: 30px; font-size: 0.9em; }
.history-group {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  background: var(--input);
}
.history-group-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.85em;
  color: var(--text-dim);
}
.history-group-header .group-actions { display: flex; gap: 6px; }
.history-group-header button {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  cursor: pointer;
  font-size: 0.8em;
}
.history-group-header button:hover { background: var(--accent); }
.history-thumbs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.history-thumb {
  width: 70px;
  height: 70px;
  border-radius: 6px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: border-color 0.2s, transform 0.2s;
}
.history-thumb:hover { border-color: var(--accent2); transform: scale(1.05); }
.history-thumb-result { border-color: var(--success); }
.history-info { font-size: 0.8em; color: var(--text-dim); margin-top: 6px; }

/* Drop zone */
.drop-zone {
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  margin-bottom: 20px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent2);
  background: rgba(233, 69, 96, 0.05);
}
.drop-zone p { font-size: 1.1em; color: var(--text-dim); }
.drop-zone .icon { font-size: 2.5em; margin-bottom: 10px; }

/* Task list */
.task-list {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}
.task-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  gap: 15px;
}
.task-item:last-child { border-bottom: none; }
.task-thumb {
  width: 60px;
  height: 60px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--input);
  flex-shrink: 0;
}
.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-meta { font-size: 0.8em; color: var(--text-dim); margin-top: 3px; }
.task-status { font-size: 0.85em; font-weight: bold; white-space: nowrap; }
.status-pending { color: var(--text-dim); }
.status-processing { color: #f9a826; }
.status-done { color: var(--success); }
.status-error { color: var(--error); }
.task-actions { display: flex; gap: 8px; }
.task-actions button {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 0.8em;
  transition: background 0.2s;
}
.task-actions button:hover { background: var(--accent); }

/* Buttons */
.btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.btn {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 24px;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.2s;
}
.btn:hover { background: var(--accent); }
.btn-primary { background: var(--accent2); border-color: var(--accent2); }
.btn-primary:hover { background: #c73e54; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Progress */
.progress-bar {
  background: var(--input);
  border-radius: 6px;
  height: 6px;
  overflow: hidden;
  margin-bottom: 20px;
  display: none;
}
.progress-fill {
  background: var(--accent2);
  height: 100%;
  width: 0%;
  transition: width 0.3s;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }

/* Compare toolbar */
.compare-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  color: var(--text);
  font-size: 0.9em;
  user-select: none;
}
.compare-toolbar button {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 1em;
  transition: background 0.2s;
}
.compare-toolbar button:hover { background: var(--accent); }
.compare-toolbar .zoom-info {
  min-width: 60px;
  text-align: center;
  color: var(--text-dim);
}

/* Compare view - synced zoom/pan */
.compare-container {
  display: flex;
  gap: 12px;
  width: 100vw;
  max-width: 100vw;
  flex: 1;
  overflow: hidden;
  position: relative;
}
.compare-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  background: #111;
}
.compare-panel.dragging { cursor: grabbing; }
.compare-panel canvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
}
.compare-label {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.6);
  color: var(--text);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.85em;
  z-index: 10;
  pointer-events: none;
}

.modal-close {
  position: fixed;
  top: 20px; right: 20px;
  background: var(--accent2);
  border: none;
  border-radius: 50%;
  width: 40px; height: 40px;
  color: white;
  cursor: pointer;
  font-size: 1.3em;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>
<div class="container">
  <h1>✂️ 去水印批量工具</h1>
  <p class="subtitle">裁剪底部水印区域 · 无需AI · 纯本地处理 · 支持批量</p>

  <div class="config-bar">
    <div>
      <label>底部裁剪高度</label>
      <input type="number" id="cropHeight" value="150" min="10" max="500">
    </div>
    <div>
      <label>输出格式</label>
      <select id="outputFormat">
        <option value="png">PNG（无损）</option>
        <option value="jpeg">JPEG（更小）</option>
      </select>
    </div>
    <div class="hint">默认150px，适用于「豆包AI生成」水印</div>
    <div>
      <label>输出目录</label>
      <input type="text" id="outputDir" placeholder="留空=默认 output 文件夹" style="width:220px;background:var(--input);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:0.9em">
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <label>历史记录组数</label>
      <input type="number" id="historyCount" value="10" min="1" max="50" style="width:70px">
      <button class="btn" id="toggleHistory" style="padding:8px 16px;font-size:0.85em">📋 历史记录</button>
      <button class="btn" id="clearHistory" style="padding:8px 16px;font-size:0.85em">🗑️ 清除历史</button>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>拖拽图片到此处，或点击选择文件</p>
    <p class="hint">支持 PNG / JPG / WEBP / BMP</p>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
  </div>

  <div class="btn-row" id="btnRow" style="display:none">
    <button class="btn btn-primary" id="processBtn">▶️ 开始处理</button>
    <button class="btn" id="downloadAllBtn">⬇️ 全部下载</button>
    <button class="btn" id="clearBtn">🗑️ 清空</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="task-list" id="taskList"></div>

  <div class="history-panel" id="historyPanel" style="display:none">
    <h3>📋 操作历史记录</h3>
    <div id="historyList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="compare-toolbar">
    <button id="zoomOut">➖</button>
    <span class="zoom-info" id="zoomInfo">100%</span>
    <button id="zoomIn">➕</button>
    <button id="zoomReset">🔄 重置</button>
    <button id="zoomFit">⤢ 适应</button>
    <span style="color:var(--text-dim);font-size:0.8em;margin-left:8px">鼠标滚轮缩放 · 拖拽平移</span>
  </div>
  <div class="compare-container" id="compareContainer"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const dropZone = $('dropZone');
const fileInput = $('fileInput');
const taskList = $('taskList');
const btnRow = $('btnRow');
const processBtn = $('processBtn');
const downloadAllBtn = $('downloadAllBtn');
const clearBtn = $('clearBtn');
const progressBar = $('progressBar');
const progressFill = $('progressFill');

let tasks = [];

// Load saved config
const savedCrop = localStorage.getItem('wm_cropHeight');
if (savedCrop) $('cropHeight').value = savedCrop;
const savedFmt = localStorage.getItem('wm_outputFormat');
if (savedFmt) $('outputFormat').value = savedFmt;
const savedHistCount = localStorage.getItem('wm_historyCount');
if (savedHistCount) $('historyCount').value = savedHistCount;
const savedOutputDir = localStorage.getItem('wm_outputDir');
if (savedOutputDir) $('outputDir').value = savedOutputDir;

// Save config on change
$('cropHeight').addEventListener('change', e => localStorage.setItem('wm_cropHeight', e.target.value));
$('outputFormat').addEventListener('change', e => localStorage.setItem('wm_outputFormat', e.target.value));
$('historyCount').addEventListener('change', e => {
  localStorage.setItem('wm_historyCount', e.target.value);
  trimHistory();
  renderHistory();
});
$('outputDir').addEventListener('change', e => localStorage.setItem('wm_outputDir', e.target.value));

// ===== History =====
const HISTORY_KEY = 'wm_history';

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveHistory(h) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
  catch(e) { console.warn('History save failed (storage full?)', e); }
}

function addHistoryGroup(tasksDone, cropHeight, format) {
  const maxCount = parseInt($('historyCount').value) || 10;
  const history = getHistory();
  
  // Build thumbnails from completed tasks - generate small data URLs for persistence
  const items = tasksDone.filter(t => t.status === 'done' && t.resultUrl).map(t => {
    // Generate small thumbnail data URLs for both original and result
    const thumbOrig = makeThumbDataUrl(t.url, 80);
    const thumbResult = makeThumbDataUrl(t.resultUrl, 80);
    return {
      name: t.name,
      originalSize: t.result?.originalSize || '',
      newSize: t.result?.newSize || '',
      thumb: thumbOrig,
      thumbResult: thumbResult
    };
  });
  
  if (!items.length) return;
  
  const group = {
    id: Date.now(),
    time: new Date().toLocaleString('zh-CN'),
    cropHeight,
    format,
    count: items.length,
    items
  };
  
  history.unshift(group);
  while (history.length > maxCount) history.pop();
  saveHistory(history);
  renderHistory();
}

function makeThumbDataUrl(srcUrl, maxSide) {
  // Generate a small thumbnail data URL from any image URL (blob: or data:)
  // Returns null if it can't (e.g. blob URL already revoked)
  try {
    const img = new Image();
    img.src = srcUrl;
    // Use canvas to downscale - must be synchronous, so we use a trick:
    // If it's already a data URL, return it as-is (small enough if < 50KB)
    if (srcUrl.startsWith('data:')) {
      // Check if it's already small
      if (srcUrl.length < 50000) return srcUrl;
    }
    // For blob URLs, we can't do synchronous canvas conversion
    // So we'll use a simpler approach: store a placeholder
    return null;
  } catch { return null; }
}

// Async thumbnail generator - called before processing completes
async function genThumbDataUrl(srcUrl, maxSide) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let { naturalWidth: w, naturalHeight: h } = img;
      const scale = Math.min(1, maxSide / Math.max(w, h));
      canvas.width = Math.round(w * scale);
      canvas.height = Math.round(h * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      try {
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      } catch { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = srcUrl;
  });
}

function trimHistory() {
  const maxCount = parseInt($('historyCount').value) || 10;
  const history = getHistory();
  while (history.length > maxCount) history.pop();
  saveHistory(history);
}

function renderHistory() {
  const panel = $('historyPanel');
  const list = $('historyList');
  const history = getHistory();
  
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">暂无历史记录</div>';
    return;
  }
  
  list.innerHTML = '';
  for (const g of history) {
    const group = document.createElement('div');
    group.className = 'history-group';
    
    let thumbs = '';
    for (const item of g.items) {
      if (item.thumbResult) {
        thumbs += `<img class="history-thumb history-thumb-result" src="${item.thumbResult}" title="${item.name}\n${item.originalSize} → ${item.newSize}">`;
      }
    }
    
    group.innerHTML = `
      <div class="history-group-header">
        <span>🕐 ${g.time} · 裁剪${g.cropHeight}px · ${g.format.toUpperCase()} · ${g.count}张</span>
        <div class="group-actions">
          <button onclick="removeHistoryGroup(${g.id})">删除</button>
        </div>
      </div>
      <div class="history-thumbs">${thumbs}</div>
      <div class="history-info">点击缩略图可放大查看</div>
    `;
    list.appendChild(group);
  }
}

window.removeHistoryGroup = function(id) {
  let history = getHistory();
  history = history.filter(g => g.id !== id);
  saveHistory(history);
  renderHistory();
};

$('toggleHistory').addEventListener('click', () => {
  const panel = $('historyPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') renderHistory();
});

$('clearHistory').addEventListener('click', () => {
  saveHistory([]);
  renderHistory();
});

// Init history on load
renderHistory();

// Drop zone
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => addFiles(e.target.files));

function addFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const task = {
      id: Date.now() + Math.random(),
      file: f,
      name: f.name,
      url: URL.createObjectURL(f),
      status: 'pending',
      result: null,
      resultUrl: null
    };
    tasks.push(task);
  }
  renderTasks();
}

function renderTasks() {
  taskList.innerHTML = '';
  btnRow.style.display = tasks.length ? 'flex' : 'none';
  
  for (const t of tasks) {
    const item = document.createElement('div');
    item.className = 'task-item';
    
    const statusClass = `status-${t.status}`;
    const statusText = {pending: '⏳ 待处理', processing: '🔄 处理中', done: '✅ 完成', error: '❌ 错误'}[t.status];
    
    let actions = '';
    if (t.status === 'done' && t.resultUrl) {
      actions = `<button onclick="showCompare('${t.id}')">👁️ 对比</button>
                 <a href="${t.resultUrl}" download="${t.name.replace(/\.[^.]+$/, '')}_nowm.png"><button>⬇️ 下载</button></a>`;
    }
    
    item.innerHTML = `
      <img class="task-thumb" src="${t.url}">
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">${t.meta || ''}${t.result?.savedPath ? '<br><span style=\'color:var(--success);font-size:0.8em\'>💾 已保存: ' + t.result.savedPath + '</span>' : ''}</div>
      </div>
      <div class="task-status ${statusClass}">${statusText}</div>
      <div class="task-actions">${actions}</div>
    `;
    taskList.appendChild(item);
  }
}

// Process
processBtn.addEventListener('click', async () => {
  const pending = tasks.filter(t => t.status === 'pending');
  if (!pending.length) return;
  
  processBtn.disabled = true;
  progressBar.style.display = 'block';
  
  const cropHeight = $('cropHeight').value;
  const format = $('outputFormat').value;
  
  // Process in batches to avoid timeout
  for (let i = 0; i < pending.length; i++) {
    const t = pending[i];
    t.status = 'processing';
    renderTasks();
    progressFill.style.width = `${(i / pending.length) * 100}%`;
    
    const fd = new FormData();
    fd.append('files', t.file);
    fd.append('cropHeight', cropHeight);
    fd.append('format', format);
    fd.append('outputDir', $('outputDir').value || '');
    
    try {
      const resp = await fetch('/process', { method: 'POST', body: fd });
      const data = await resp.json();
      
      if (data.results && data.results[0] && !data.results[0].error) {
        const r = data.results[0];
        t.status = 'done';
        t.meta = `${r.originalSize} → ${r.newSize}`;
        t.resultUrl = r.data;
        t.result = r;
        if (r.savedPath) t.meta += ` → ${r.savedPath}`;
      } else {
        t.status = 'error';
        t.meta = data.results?.[0]?.error || 'Unknown error';
      }
    } catch (e) {
      t.status = 'error';
      t.meta = e.message;
    }
    renderTasks();
  }
  
  progressFill.style.width = '100%';
  processBtn.disabled = false;
  setTimeout(() => progressBar.style.display = 'none', 2000);
  
  // Record to history (async - generate thumbnails first)
  const doneTasks = pending.filter(t => t.status === 'done' && t.resultUrl);
  if (doneTasks.length) {
    // Generate thumbnails asynchronously for all done tasks
    const thumbPromises = doneTasks.map(async t => {
      const [thumb, thumbResult] = await Promise.all([
        genThumbDataUrl(t.url, 80),
        genThumbDataUrl(t.resultUrl, 80)
      ]);
      return {
        name: t.name,
        originalSize: t.result?.originalSize || '',
        newSize: t.result?.newSize || '',
        thumb,
        thumbResult
      };
    });
    Promise.all(thumbPromises).then(items => {
      const maxCount = parseInt($('historyCount').value) || 10;
      const history = getHistory();
      const group = {
        id: Date.now(),
        time: new Date().toLocaleString('zh-CN'),
        cropHeight,
        format,
        count: items.length,
        items
      };
      history.unshift(group);
      while (history.length > maxCount) history.pop();
      saveHistory(history);
      renderHistory();
    });
  }
});

// Download all - files already saved to disk by server; this triggers browser download as fallback
downloadAllBtn.addEventListener('click', () => {
  const done = tasks.filter(t => t.status === 'done');
  if (!done.length) return;
  
  // Check if files were saved to disk
  const allSaved = done.every(t => t.result?.savedPath);
  if (allSaved) {
    // Files already on disk - show summary
    const dir = done[0].result.savedPath;
    const folder = dir.substring(0, dir.lastIndexOf('\\'));
    alert(`文件已保存到磁盘:\n${folder}\n\n共 ${done.length} 张图片`);
    return;
  }
  
  // Fallback: browser download
  done.forEach(t => {
    const a = document.createElement('a');
    a.href = t.resultUrl;
    a.download = t.name.replace(/\.[^.]+$/, '_nowm.png');
    a.click();
  });
});

// Clear
clearBtn.addEventListener('click', () => {
  tasks = [];
  renderTasks();
  progressBar.style.display = 'none';
});

// ===== Compare modal with synced zoom/pan =====
let compareState = { zoom: 1, panX: 0, panY: 0, imgs: [], canvases: [], panels: [] };

window.showCompare = function(taskId) {
  const t = tasks.find(x => x.id == taskId);
  if (!t) return;
  
  const container = $('compareContainer');
  container.innerHTML = '';
  
  const labels = ['原图', '去水印后'];
  const urls = [t.url, t.resultUrl];
  
  compareState = { zoom: 1, panX: 0, panY: 0, imgs: [], canvases: [], panels: [] };
  
  for (let i = 0; i < 2; i++) {
    const panel = document.createElement('div');
    panel.className = 'compare-panel';
    
    const label = document.createElement('div');
    label.className = 'compare-label';
    label.textContent = labels[i];
    label.style.color = i === 0 ? 'var(--text-dim)' : 'var(--success)';
    panel.appendChild(label);
    
    const canvas = document.createElement('canvas');
    panel.appendChild(canvas);
    
    container.appendChild(panel);
    
    const img = new Image();
    img.onload = function() {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      compareState.imgs[i] = img;
      if (compareState.imgs[0] && compareState.imgs[1]) {
        zoomFit();
      }
    };
    img.src = urls[i];
    
    compareState.canvases[i] = canvas;
    compareState.panels[i] = panel;
    
    // Synced drag/pan
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    
    panel.addEventListener('mousedown', e => {
      isDragging = true;
      dragStart = { x: e.clientX - compareState.panX, y: e.clientY - compareState.panY };
      panel.classList.add('dragging');
      e.preventDefault();
    });
    
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      compareState.panX = e.clientX - dragStart.x;
      compareState.panY = e.clientY - dragStart.y;
      applyTransform();
    });
    
    window.addEventListener('mouseup', () => {
      isDragging = false;
      compareState.panels.forEach(p => p.classList.remove('dragging'));
    });
  }
  
  // Synced wheel zoom
  container.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newZoom = Math.min(10, Math.max(0.1, compareState.zoom * delta));
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    compareState.panX = mx - (mx - compareState.panX) * (newZoom / compareState.zoom);
    compareState.panY = my - (my - compareState.panY) * (newZoom / compareState.zoom);
    compareState.zoom = newZoom;
    applyTransform();
  });
  
  $('modalOverlay').classList.add('active');
};

function applyTransform() {
  const t = `translate(${compareState.panX}px, ${compareState.panY}px) scale(${compareState.zoom})`;
  compareState.canvases.forEach(c => { if (c) c.style.transform = t; });
  $('zoomInfo').textContent = Math.round(compareState.zoom * 100) + '%';
}

function zoomFit() {
  const panel = compareState.panels[0];
  if (!panel || !compareState.imgs[0]) return;
  const pw = panel.clientWidth;
  const ph = panel.clientHeight;
  const iw = compareState.imgs[0].naturalWidth;
  const ih = compareState.imgs[0].naturalHeight;
  const sx = pw / iw;
  const sy = ph / ih;
  compareState.zoom = Math.min(sx, sy) * 0.95;
  compareState.panX = (pw - iw * compareState.zoom) / 2;
  compareState.panY = (ph - ih * compareState.zoom) / 2;
  applyTransform();
}

function zoomReset() {
  compareState.zoom = 1;
  compareState.panX = 0;
  compareState.panY = 0;
  applyTransform();
}

$('zoomIn').addEventListener('click', () => {
  compareState.zoom = Math.min(10, compareState.zoom * 1.25);
  applyTransform();
});
$('zoomOut').addEventListener('click', () => {
  compareState.zoom = Math.max(0.1, compareState.zoom * 0.8);
  applyTransform();
});
$('zoomReset').addEventListener('click', zoomReset);
$('zoomFit').addEventListener('click', zoomFit);

$('modalClose').addEventListener('click', () => $('modalOverlay').classList.remove('active'));
$('modalOverlay').addEventListener('click', e => {
  if (e.target === $('modalOverlay')) $('modalOverlay').classList.remove('active');
});
</script>
</body>
