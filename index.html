<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去水印批量工具</title>
<style>
:root {
  --bg: #0f0f1e;
  --card: #1a1a2e;
  --input: #16213e;
  --accent: #0f3460;
  --accent2: #e94560;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: #2a2a4a;
  --success: #4ecca3;
  --error: #e94560;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1100px; margin: 0 auto; }
h1 { text-align: center; font-size: 1.8em; margin-bottom: 20px; color: var(--text); }
.subtitle { text-align: center; color: var(--text-dim); margin-bottom: 30px; font-size: 0.9em; }

/* Config */
.config-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.config-bar label { font-size: 0.9em; color: var(--text-dim); }
.config-bar input[type="number"] {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 1em;
  width: 100px;
}
.config-bar select {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 0.9em;
}
.hint { color: var(--text-dim); font-size: 0.8em; }

/* Drop zone */
.drop-zone {
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  margin-bottom: 20px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent2);
  background: rgba(233, 69, 96, 0.05);
}
.drop-zone p { font-size: 1.1em; color: var(--text-dim); }
.drop-zone .icon { font-size: 2.5em; margin-bottom: 10px; }

/* Task list */
.task-list {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}
.task-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  gap: 15px;
}
.task-item:last-child { border-bottom: none; }
.task-thumb {
  width: 60px;
  height: 60px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--input);
  flex-shrink: 0;
}
.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-meta { font-size: 0.8em; color: var(--text-dim); margin-top: 3px; }
.task-status { font-size: 0.85em; font-weight: bold; white-space: nowrap; }
.status-pending { color: var(--text-dim); }
.status-processing { color: #f9a826; }
.status-done { color: var(--success); }
.status-error { color: var(--error); }
.task-actions { display: flex; gap: 8px; }
.task-actions button {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 0.8em;
  transition: background 0.2s;
}
.task-actions button:hover { background: var(--accent); }

/* Buttons */
.btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.btn {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 24px;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.2s;
}
.btn:hover { background: var(--accent); }
.btn-primary { background: var(--accent2); border-color: var(--accent2); }
.btn-primary:hover { background: #c73e54; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Progress */
.progress-bar {
  background: var(--input);
  border-radius: 6px;
  height: 6px;
  overflow: hidden;
  margin-bottom: 20px;
  display: none;
}
.progress-fill {
  background: var(--accent2);
  height: 100%;
  width: 0%;
  transition: width 0.3s;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  max-width: 90vw;
  max-height: 90vh;
  overflow: auto;
}
.modal img { max-width: 100%; max-height: 80vh; border-radius: 8px; }
.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: var(--accent2);
  border: none;
  border-radius: 50%;
  width: 36px; height: 36px;
  color: white;
  cursor: pointer;
  font-size: 1.2em;
}

/* Compare view */
.compare { display: flex; gap: 10px; }
.compare img { max-width: 48%; border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>✂️ 去水印批量工具</h1>
  <p class="subtitle">裁剪底部水印区域 · 无需AI · 纯本地处理 · 支持批量</p>

  <div class="config-bar">
    <div>
      <label>底部裁剪高度</label>
      <input type="number" id="cropHeight" value="150" min="10" max="500">
    </div>
    <div>
      <label>输出格式</label>
      <select id="outputFormat">
        <option value="png">PNG（无损）</option>
        <option value="jpeg">JPEG（更小）</option>
      </select>
    </div>
    <div class="hint">默认150px，适用于「豆包AI生成」水印</div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>拖拽图片到此处，或点击选择文件</p>
    <p class="hint">支持 PNG / JPG / WEBP / BMP</p>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
  </div>

  <div class="btn-row" id="btnRow" style="display:none">
    <button class="btn btn-primary" id="processBtn">▶️ 开始处理</button>
    <button class="btn" id="downloadAllBtn">⬇️ 全部下载</button>
    <button class="btn" id="clearBtn">🗑️ 清空</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal" id="modalContent"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const dropZone = $('dropZone');
const fileInput = $('fileInput');
const taskList = $('taskList');
const btnRow = $('btnRow');
const processBtn = $('processBtn');
const downloadAllBtn = $('downloadAllBtn');
const clearBtn = $('clearBtn');
const progressBar = $('progressBar');
const progressFill = $('progressFill');

let tasks = [];

// Load saved config
const savedCrop = localStorage.getItem('wm_cropHeight');
if (savedCrop) $('cropHeight').value = savedCrop;
const savedFmt = localStorage.getItem('wm_outputFormat');
if (savedFmt) $('outputFormat').value = savedFmt;

// Save config on change
$('cropHeight').addEventListener('change', e => localStorage.setItem('wm_cropHeight', e.target.value));
$('outputFormat').addEventListener('change', e => localStorage.setItem('wm_outputFormat', e.target.value));

// Drop zone
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => addFiles(e.target.files));

function addFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const task = {
      id: Date.now() + Math.random(),
      file: f,
      name: f.name,
      url: URL.createObjectURL(f),
      status: 'pending',
      result: null,
      resultUrl: null
    };
    tasks.push(task);
  }
  renderTasks();
}

function renderTasks() {
  taskList.innerHTML = '';
  btnRow.style.display = tasks.length ? 'flex' : 'none';
  
  for (const t of tasks) {
    const item = document.createElement('div');
    item.className = 'task-item';
    
    const statusClass = `status-${t.status}`;
    const statusText = {pending: '⏳ 待处理', processing: '🔄 处理中', done: '✅ 完成', error: '❌ 错误'}[t.status];
    
    let actions = '';
    if (t.status === 'done' && t.resultUrl) {
      actions = `<button onclick="showCompare('${t.id}')">👁️ 对比</button>
                 <a href="${t.resultUrl}" download="${t.name.replace(/\.[^.]+$/, '')}_nowm.png"><button>⬇️ 下载</button></a>`;
    }
    
    item.innerHTML = `
      <img class="task-thumb" src="${t.url}">
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">${t.meta || ''}</div>
      </div>
      <div class="task-status ${statusClass}">${statusText}</div>
      <div class="task-actions">${actions}</div>
    `;
    taskList.appendChild(item);
  }
}

// Process
processBtn.addEventListener('click', async () => {
  const pending = tasks.filter(t => t.status === 'pending');
  if (!pending.length) return;
  
  processBtn.disabled = true;
  progressBar.style.display = 'block';
  
  const cropHeight = $('cropHeight').value;
  const format = $('outputFormat').value;
  
  // Process in batches to avoid timeout
  for (let i = 0; i < pending.length; i++) {
    const t = pending[i];
    t.status = 'processing';
    renderTasks();
    progressFill.style.width = `${(i / pending.length) * 100}%`;
    
    const fd = new FormData();
    fd.append('files', t.file);
    fd.append('cropHeight', cropHeight);
    fd.append('format', format);
    
    try {
      const resp = await fetch('/process', { method: 'POST', body: fd });
      const data = await resp.json();
      
      if (data.results && data.results[0] && !data.results[0].error) {
        const r = data.results[0];
        t.status = 'done';
        t.meta = `${r.originalSize} → ${r.newSize}`;
        t.resultUrl = r.data;
        t.result = r;
      } else {
        t.status = 'error';
        t.meta = data.results?.[0]?.error || 'Unknown error';
      }
    } catch (e) {
      t.status = 'error';
      t.meta = e.message;
    }
    renderTasks();
  }
  
  progressFill.style.width = '100%';
  processBtn.disabled = false;
  setTimeout(() => progressBar.style.display = 'none', 2000);
});

// Download all
downloadAllBtn.addEventListener('click', () => {
  tasks.filter(t => t.status === 'done').forEach(t => {
    const a = document.createElement('a');
    a.href = t.resultUrl;
    a.download = t.name.replace(/\.[^.]+$/, '_nowm.png');
    a.click();
  });
});

// Clear
clearBtn.addEventListener('click', () => {
  tasks = [];
  renderTasks();
  progressBar.style.display = 'none';
});

// Compare modal
window.showCompare = function(taskId) {
  const t = tasks.find(x => x.id == taskId);
  if (!t) return;
  
  const modal = $('modalContent');
  modal.innerHTML = `
    <div class="compare">
      <div>
        <p style="text-align:center;margin-bottom:8px;color:var(--text-dim)">原图</p>
        <img src="${t.url}">
      </div>
      <div>
        <p style="text-align:center;margin-bottom:8px;color:var(--success)">去水印后</p>
        <img src="${t.resultUrl}">
      </div>
    </div>
  `;
  $('modalOverlay').classList.add('active');
};

$('modalClose').addEventListener('click', () => $('modalOverlay').classList.remove('active'));
$('modalOverlay').addEventListener('click', e => {
  if (e.target === $('modalOverlay')) $('modalOverlay').classList.remove('active');
});
</script>
</body>
</html>
